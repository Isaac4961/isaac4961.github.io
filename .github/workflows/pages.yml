name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A0F4DE: ${{ secrets.A0F4DE }}
          BF9B1E: ${{ secrets.BF9B1E }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A0F4DE', '')
          tag_b = os.environ.get('BF9B1E', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 666c6543fa4567324e3272352f88e2f3 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- adb126c0c6dba3e491327a51 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
